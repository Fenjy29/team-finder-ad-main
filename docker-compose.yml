services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_finder}
      POSTGRES_USER: ${POSTGRES_USER:-team_finder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team_finder}
    container_name: teamfinder_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: teamfinder_web
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-only-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-team_finder}
      POSTGRES_USER: ${POSTGRES_USER:-team_finder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team_finder}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      TASK_VERSION: "3"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
  media_data:
